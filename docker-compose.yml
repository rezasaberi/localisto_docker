services:
  php:
    container_name: php
    build:
      context: .
      dockerfile: ./php/Dockerfile
    volumes:
      - ../backend:/var/www
    depends_on:
      mysqldb:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      XDEBUG_MODE: debug
      XDEBUG_START_WITH_REQUEST: yes
      XDEBUG_CLIENT_HOST: host.docker.internal
      XDEBUG_CLIENT_PORT: 9003
      PHP_IDE_CONFIG: serverName=local
    networks:
      - laravel
    ports:
      - "6001:6001"
    entrypoint: >
      sh -c "
        chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
        php-fpm
      "

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - laravel

  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shopshop
      MYSQL_ROOT_PASSWORD: saberi
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel

  apache:
    container_name: apache
    build:
      context: .
      dockerfile: ./apache/Dockerfile
    ports:
      - "80:80"
    volumes:
      - ../backend:/var/www
      - ../frontend:/usr/local/apache2/htdocs/frontend
      - ./apache/shopshop.conf:/usr/local/apache2/conf/extra/shopshop.conf
      - ../index.html:/usr/local/apache2/htdocs/index.html
    depends_on:
      php:
        condition: service_started
    networks:
      - laravel

