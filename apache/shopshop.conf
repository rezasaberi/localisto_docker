ServerName localhost

<VirtualHost *:80>
    ServerName admin.localisto.local
    ServerAlias api.localisto.local
    
    DocumentRoot /var/www/public
    
    <Directory /var/www/public>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>
    
    # Proxy to PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
    
    DirectoryIndex index.php
</VirtualHost>

<VirtualHost *:80>
    ServerName localisto.local
    
    DocumentRoot /usr/local/apache2/htdocs
    
    <Directory /usr/local/apache2/htdocs>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        RewriteEngine On
        
        # 0. Prevent infinite loops for frontend/ requests
        RewriteCond %{REQUEST_URI} ^/frontend/
        RewriteRule ^ - [L]

        # 1. If file/dir exists, serve it
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        
        # 2. Map "slug" (root level path segment) to frontend/index.html (Store Home)
        # Matches /pizzeria-nadia
        RewriteRule ^[^/]+$ frontend/index.html [L]
        
        # 3. Map "slug/path" to frontend/path
        # Matches /pizzeria-nadia/products.html -> /frontend/products.html
        RewriteRule ^[^/]+/(.*)$ frontend/$1 [L]
        
        # 4. Fallback for SPA inside the store context (optional depending on frontend needs)
        # If the rewritten path inside frontend doesn't exist, fallback to frontend/index.html?
        # For now, let's rely on the above.
    </Directory>
</VirtualHost>
