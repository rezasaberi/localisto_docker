ServerName localhost

<VirtualHost *:80>
    ServerName admin.localisto.local
    ServerAlias api.localisto.local
    
    DocumentRoot /var/www/public
    
    <Directory /var/www/public>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>
    
    # Proxy to PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
    
    DirectoryIndex index.php
</VirtualHost>

<VirtualHost *:80>
    ServerName localisto.local
    
    DocumentRoot /usr/local/apache2/htdocs/frontend
    
    <Directory /usr/local/apache2/htdocs/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        RewriteEngine On
        
        # 1. If file/dir exists, serve it
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        
        # 2. Strip store slug (first path segment) if it looks like a slug path
        # Matches /something/rest -> /rest
        RewriteRule ^[^/]+/(.*)$ $1 [L]
        
        # 3. Fallback to index.html for SPA
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>
</VirtualHost>
